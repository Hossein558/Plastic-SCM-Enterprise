name: Plastic SCM Windows Setup - Phase 2

on:
  # push:
  #   branches: [ "main", "master" ]
  # pull_request:
  #   branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  setup-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Windows Server Version
        run: |
          Write-Host "Checking OS details..." -ForegroundColor Cyan
          systeminfo | Select-String "OS Name", "OS Version"
          Write-Host "Windows Server 2022 environment is ready." -ForegroundColor Green
          
      - name: Download Plastic SCM Installer
        run: |
          $installerUrl = "https://d26z97tczqnlef.cloudfront.net/releases/11.0.16.10042/plasticscm/windows/unity-vcs-on-prem-full-11.0.16.10042-win.exe"
          $outputFile = "unity-vcs-installer.exe"
          Write-Host "Downloading Unity VCS (Plastic SCM) Installer..." -ForegroundColor Yellow
          Invoke-WebRequest -Uri $installerUrl -OutFile $outputFile
          Write-Host "Download completed successfully!" -ForegroundColor Green

      - name: Verify All Files
        run: |
          Write-Host "Listing files in the current directory:" -ForegroundColor Cyan
          Get-ChildItem